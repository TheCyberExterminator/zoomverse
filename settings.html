<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZOOMVERSE — Settings</title>
<link rel="stylesheet" href="styles.css" />
<style>
  body{background:radial-gradient(1100px 700px at 75% 10%,#3b2c7a,#1a1f63 45%,#0a0d33);min-height:100vh}
  .wrap{position:relative;z-index:2;max-width:560px;margin:0 auto;padding:2rem 1.4rem}
  h1{font-weight:900;text-transform:uppercase;font-size:2rem;margin-bottom:1.2rem}
  h1 span{color:#27C4F2}
  .set{background:rgba(16,24,74,.6);border:1px solid rgba(39,196,242,.25);border-radius:16px;padding:1rem 1.1rem;margin-bottom:1rem}
  .set label{display:flex;justify-content:space-between;font-weight:800;margin-bottom:.5rem}
  .set .val{color:#27C4F2}
  input[type=range]{width:100%;accent-color:#27C4F2}
  .row{display:flex;gap:.6rem;margin-top:1rem}
  .btn{font-family:inherit;font-weight:800;border:none;border-radius:12px;padding:.7rem 1.1rem;cursor:pointer;
    color:#fff;background:linear-gradient(180deg,#2E5BE0,#1b2f8f);box-shadow:0 3px 0 #0e1a5c}
  .btn.gold{color:#221500;background:linear-gradient(180deg,#F2B43A,#d9920f);box-shadow:0 3px 0 #8a5e08}
  .note{opacity:.75;font-size:.8rem;margin-top:.3rem}
</style>
</head>
<body>
  <div class="stars-bg" style="position:fixed;inset:0;opacity:.5;background-image:radial-gradient(2px 2px at 20% 30%,#fff,transparent),radial-gradient(1.5px 1.5px at 80% 20%,#cfe6ff,transparent)"></div>
  <a class="hublink" href="index.html">⌂ Hub</a>

  <div class="wrap">
    <h1>SET<span>TINGS</span></h1>

    <div class="set">
      <label>Music volume <span class="val" id="musicVal">60%</span></label>
      <input type="range" id="music" min="0" max="100" value="60" />
    </div>
    <div class="set">
      <label>Sound effects <span class="val" id="sfxVal">80%</span></label>
      <input type="range" id="sfx" min="0" max="100" value="80" />
      <div class="note">Move this slider or press Test to hear the level.</div>
    </div>
    <div class="set">
      <label>Camera distance <span class="val" id="camVal">Medium</span></label>
      <input type="range" id="cam" min="0" max="100" value="50" />
      <div class="note">How far the chase camera sits behind the car (applies on your next race).</div>
    </div>

    <div class="row">
      <button class="btn gold" id="testBtn">🔊 Test sound</button>
      <button class="btn" id="resetBtn">Reset to defaults</button>
    </div>
  </div>

  <script type="module">
    import { Save } from "./src/save.js";
    import { Audio } from "./src/audio.js";

    const s = Save.getSettings();
    const music = document.getElementById("music"), sfx = document.getElementById("sfx"), cam = document.getElementById("cam");
    music.value = Math.round(s.music * 100);
    sfx.value = Math.round(s.sfx * 100);
    cam.value = Math.round(s.camDist * 100);

    const camLabel = (v) => v < 0.34 ? "Close" : v > 0.66 ? "Far" : "Medium";
    function paint() {
      document.getElementById("musicVal").textContent = music.value + "%";
      document.getElementById("sfxVal").textContent = sfx.value + "%";
      document.getElementById("camVal").textContent = camLabel(cam.value / 100);
    }
    paint();

    music.oninput = () => { paint(); const v = music.value / 100; Save.setSetting("music", v); Audio.unlock(); Audio.setMusicVolume(v); };
    sfx.oninput = () => { paint(); const v = sfx.value / 100; Save.setSetting("sfx", v); Audio.unlock(); Audio.setSfxVolume(v); Audio.click(); };
    cam.oninput = () => { paint(); Save.setSetting("camDist", cam.value / 100); };

    document.getElementById("testBtn").onclick = () => { Audio.unlock(); Audio.star(); };
    document.getElementById("resetBtn").onclick = () => {
      Save.setSetting("music", 0.6); Save.setSetting("sfx", 0.8); Save.setSetting("camDist", 0.5);
      music.value = 60; sfx.value = 80; cam.value = 50; paint();
      Audio.unlock(); Audio.setSfxVolume(0.8); Audio.setMusicVolume(0.6);
    };
  </script>
</body>
</html>
