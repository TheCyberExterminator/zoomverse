<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZOOMVERSE — Garage</title>
<link rel="stylesheet" href="styles.css" />
<style>
  body{background:radial-gradient(1100px 700px at 75% 10%,#3b2c7a,#1a1f63 45%,#0a0d33);min-height:100vh;overflow-y:auto}
  .wrap{position:relative;z-index:2;max-width:920px;margin:0 auto;padding:1.4rem}
  .top{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
  .top h1{font-weight:900;text-transform:uppercase;font-size:2rem}
  .top h1 span{color:#27C4F2}
  .starbox{background:linear-gradient(180deg,rgba(242,180,58,.25),rgba(16,26,77,.5));
    border:2px solid rgba(242,180,58,.6);border-radius:14px;padding:.5rem 1rem;text-align:center}
  .starbox .n{font-size:1.5rem;font-weight:900;color:#F2B43A;line-height:1}
  .starbox .l{font-size:.65rem;letter-spacing:.1em;opacity:.85}
  .row{display:grid;grid-template-columns:130px 1fr 110px;gap:.8rem;align-items:center;
    background:rgba(16,24,74,.6);border:1px solid rgba(39,196,242,.25);border-radius:16px;padding:.7rem .9rem;margin-bottom:.7rem}
  .row .name{font-weight:800}
  .row .name small{display:block;font-weight:600;opacity:.7;font-size:.72rem}
  .pips{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .pip{width:30px;height:14px;border-radius:6px;background:rgba(255,255,255,.15)}
  .pip.on{background:linear-gradient(90deg,#27C4F2,#8fe3ff);box-shadow:0 0 8px rgba(39,196,242,.6)}
  .buy{font-family:inherit;font-weight:800;border:none;border-radius:12px;padding:.55rem .4rem;cursor:pointer;
    color:#221500;background:linear-gradient(180deg,#F2B43A,#d9920f);box-shadow:0 3px 0 #8a5e08}
  .buy:disabled{filter:grayscale(.6) brightness(.8);cursor:not-allowed;box-shadow:none}
  .buy.max{background:linear-gradient(180deg,#39d353,#1f9c3a);color:#06210f;box-shadow:0 3px 0 #0d5a1d}
  .msg{min-height:1.2em;text-align:center;color:#ffd27a;font-weight:700;margin:.4rem 0 1rem}
</style>
</head>
<body>
  <div class="stars-bg" style="position:fixed;inset:0;opacity:.5;background-image:radial-gradient(2px 2px at 20% 30%,#fff,transparent),radial-gradient(1.5px 1.5px at 80% 20%,#cfe6ff,transparent),radial-gradient(1px 1px at 50% 60%,#fff,transparent)"></div>
  <a class="hublink" href="index.html">⌂ Hub</a>

  <div class="wrap">
    <div class="top">
      <h1>GA<span>RAGE</span></h1>
      <div class="starbox"><div class="n" id="starTotal">0</div><div class="l">★ STARS</div></div>
    </div>
    <p style="opacity:.9;margin-bottom:1rem">Spend stars to upgrade the Blue Star Racer. Costs rise each level: 10 · 20 · 35 · 55 · 80.</p>
    <div class="msg" id="msg"></div>
    <div id="list"></div>
  </div>

  <script type="module">
    import { Save } from "./src/save.js";
    import { Audio } from "./src/audio.js";

    const TRACKS = [
      ["engine", "Engine", "Top speed & acceleration"],
      ["wheels", "Wheels", "Grip & drift control"],
      ["boost", "Boost", "Boost power & recharge"],
      ["shield", "Shield", "Impact resistance"],
      ["jump", "Jump", "Ramp height & air time"],
      ["magnet", "Magnet", "Star pickup radius"],
    ];
    const list = document.getElementById("list");
    const msg = document.getElementById("msg");

    function render() {
      const d = Save.load();
      document.getElementById("starTotal").textContent = d.stars || 0;
      list.innerHTML = "";
      for (const [key, name, desc] of TRACKS) {
        const lvl = Save.level(key);
        const next = lvl < 5 ? Save.UPGRADE_COSTS[lvl] : null;
        const row = document.createElement("div");
        row.className = "row";
        const pips = Array.from({ length: 5 }, (_, i) => `<span class="pip ${i < lvl ? "on" : ""}"></span>`).join("");
        const canAfford = next !== null && (d.stars || 0) >= next;
        const btn = lvl >= 5
          ? `<button class="buy max" disabled>★ MAX</button>`
          : `<button class="buy" data-k="${key}" ${canAfford ? "" : "disabled"}>★ ${next}</button>`;
        row.innerHTML = `<div class="name">${name}<small>${desc}</small></div>
          <div class="pips">${pips}<span style="opacity:.7;margin-left:6px">Lv ${lvl}/5</span></div>${btn}`;
        list.appendChild(row);
      }
      list.querySelectorAll(".buy[data-k]").forEach((b) => {
        b.onclick = () => {
          const r = Save.buy(b.dataset.k);
          Audio.unlock();
          if (r.ok) { Audio.star(); msg.textContent = "Upgraded! " + r.stars + " stars left."; }
          else { Audio.click(); msg.textContent = r.reason === "stars" ? "Not enough stars — go race for more!" : "Maxed out."; }
          render();
        };
      });
    }
    render();
  </script>
</body>
</html>
